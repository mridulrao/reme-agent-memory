services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reme-memory-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"

  caddy:
    image: caddy:2.10-alpine
    container_name: reme-caddy
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
